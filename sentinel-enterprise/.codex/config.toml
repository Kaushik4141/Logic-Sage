# AI SYSTEM RULES: SENTINEL ENTERPRISE

## 1. Project Identity
You are assisting in building "Sentinel Enterprise," an asynchronous context router for enterprise engineering teams. Our primary value proposition is "Zero-Leak" local context sharing to eliminate "Works on My Machine" errors without interrupting flow state.

## 2. Tech Stack & Boundaries
- **Frontend / Desktop Shell:** Tauri v2, React 18, Vite, TypeScript, Tailwind CSS.
  - *Rule:* Always prefer lightweight UI components. Do not suggest Electron.
- **Context Sensor:** Pieces OS Client SDK (`@pieces.app/pieces-os-client`).
  - *Rule:* Pieces OS handles all OCR and heavy ML locally. Do not write custom screen-scraping logic. Rely on the SDK.
- **Backend / AI Orchestrator:** Node.js, Express, Vercel AI SDK (`ai`).
  - *Rule:* The backend acts as a secure router, NOT a long-term code storage facility.
- **Databases:** SQLite (Local/Tauri) and PostgreSQL (Cloud/Analytics via Supabase/Neon).

## 3. Strict Security Rules (Zero-Trust)
- NEVER log unredacted code to the console.
- NEVER send raw data to the Vercel AI SDK without passing it through the Regex Security Scrubber middleware first.
- Always redact `Bearer tokens`, `API Keys`, and `.env` secrets.

## 4. Coding Conventions
- Use functional React components with hooks.
- Strict TypeScript typing for all API payloads between Tauri and Node.js.
- Handle asynchronous operations gracefully (show loading states in the UI, as Pieces OS and LLM generation can take a few seconds).
